{% extends "base.html" %}

{% block content %}
<div class="snippet-box">

    <h2>Create Code Snippet ✨</h2>

    <form method="POST">

        <input type="text" name="title" placeholder="Snippet Title" required>

        <textarea name="code" placeholder="Write your code here..." required></textarea>

        <button type="submit">🚀 Post Snippet</button>

    </form>

</div>
{% endblock %}
