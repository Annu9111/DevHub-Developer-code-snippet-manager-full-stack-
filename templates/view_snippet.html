{% extends "base.html" %}

{% block content %}

<h2>DevHub Snippets</h2>

{% for snippet in snippets %}

<div class="card">
<h3>{{snippet[1]}}</h3>
<p><b>Author:</b> {{snippet[3]}}</p>

<pre style="background:#1e1e1e;color:#00ff9c;padding:15px;border-radius:8px;">
{{snippet[2]}}
</pre>

<a href="/edit/{{snippet[0]}}">Edit</a> | <a href="/delete/{{snippet[0]}}">Delete</a>

<hr>
</div>
{% endfor %}

{% endblock %}
